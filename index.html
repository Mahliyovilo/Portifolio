<!DOCTYPE html>
<html lang="uz">
<head>

    <title>Portfolio - Alimardon</title>
    <script src="https://cdn.tailwindcss.com"></script>
  
</head>
<body class="bg-[#0f0f0f] text-white m-0 p-0 overflow-x-hidden">
    <nav class="bg-white text-black py-5 shadow-md w-full">
    <div class="container mx-auto flex justify-center">
        <ul class="flex space-x-10 text-2xl font-bold tracking-widest font-italic">
            <li><a href="#" class="hover:text-[#b5c759] transition-colors">HOME</a></li>

            <li><a href="#" class="hover:text-[#b5c759] transition-colors">CONTACT</a></li>

    <main class="relative w-full h-[calc(100vh-70px)] flex flex-col md:flex-row items-center px-10 md:px-24 lg:px-40 overflow-hidden">

            <img 
                src="imges/header.webp"
